# Sherpa 3.0 standalone: LO Z[ee]+jet at the LHC (13 TeV).
# Single-flavour (ee) is used, as in the bundled LHC_ZJets example; the jet-mass
# shape is lepton-universal, so this matches the ee+mumu sample of the other
# generators (absolute sigma differs by the e/mu factor -> compare normalised).
# HepMC is written and Rivet is run as a separate step.

BEAMS: 2212
BEAM_ENERGIES: 6500
ME_GENERATORS: [Comix]

# Use the default PDF4LHC21 via LHAPDF (downloaded into ../.lhapdf; the run
# scripts set LHAPDF_DATA_PATH). On cvmfs/LPC this set is already available.
PDF_LIBRARY: LHAPDFSherpa
PDF_SET: PDF4LHC21_40_pdfas

RANDOM_SEED: 12345

# pp -> Z[ee] + 1 parton at LO
PROCESSES:
- 93 93 -> 11 -11 93:
    Order: {QCD: 1, EW: 2}

SELECTORS:
# Z mass window
- [Mass, 11, -11, 60, 120]
# require a hard recoil jet at ME level, below the 200 GeV fiducial threshold
- NJetFinder:
    N: 1
    PTMin: 150.0
    ETMin: 0.0
    R: 0.4

# HepMC3 event output -> out/sherpa.hepmc
EVENT_OUTPUT: HepMC3_GenEvent[out/sherpa]
